name: ImmortalWrt IPQ50xx Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3 python3-setuptools \
          rsync unzip zlib1g-dev file wget ccache

    - name: Clone ImmortalWrt IPQ50xx
      run: |
        git clone https://github.com/kkstone/immortalwrt-ipq50xx.git openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy your config + files
      run: |
        cp config/.config openwrt/.config
        mkdir -p openwrt/files
        cp -r files/* openwrt/files/

    - name: Build firmware
      run: |
        cd openwrt
        make defconfig
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: D50-Firmware
        path: openwrt/bin/targets/qualcommax/ipq50xx/
